name: CI

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "src-tauri/**"
      - "sidecar/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: pnpm build
        run: pnpm build

  sidecar:
    name: Sidecar
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install sidecar deps
        working-directory: sidecar
        run: uv sync --extra dev

      - name: Ruff
        working-directory: sidecar
        run: uv run ruff check .

      - name: Pytest
        working-directory: sidecar
        run: uv run pytest -m "not integration"

      - name: Python dependency check
        working-directory: sidecar
        run: uv pip check

  rust:
    name: Rust
    runs-on: ubuntu-latest

    env:
      # cargo check/test should compile app code without building or downloading
      # bundle-only sidecars, Ollama, LiteParse, or browser runtimes.
      TAURI_CONFIG: '{"bundle":{"externalBin":[],"resources":null}}'

    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            wget

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: cargo check
        working-directory: src-tauri
        run: cargo check

      - name: cargo test
        working-directory: src-tauri
        run: cargo test
